packages:
  - packages/*

allowBuilds:
  '@biomejs/biome': true
  '@bufbuild/buf': true
  cpu-features: false
  esbuild: true
  protobufjs: true
  ssh2: false

catalog:
  '@biomejs/biome': ^2.5.0
  '@bufbuild/buf': ^1.70.0
  '@bufbuild/protobuf': ^2.12.1
  '@bufbuild/protoc-gen-es': ^2.12.1
  '@bufbuild/protoplugin': ^2.12.1
  '@bufbuild/protovalidate': ^1.2.0
  '@commitlint/cli': ^20.4.1
  '@commitlint/config-conventional': ^20.4.1
  '@connectrpc/connect': ^2.1.2
  '@connectrpc/connect-node': ^2.1.2
  '@connectrpc/validate': ^0.2.0
  '@exodus/test': ^1.0.0-rc.116
  '@opentelemetry/api': ^1.9.0
  '@opentelemetry/api-logs': ^0.219.0
  '@opentelemetry/context-async-hooks': ^2.8.0
  '@opentelemetry/core': ^2.8.0
  '@opentelemetry/exporter-logs-otlp-grpc': ^0.219.0
  '@opentelemetry/exporter-logs-otlp-http': ^0.219.0
  '@opentelemetry/exporter-metrics-otlp-grpc': ^0.219.0
  '@opentelemetry/exporter-metrics-otlp-http': ^0.219.0
  '@opentelemetry/exporter-trace-otlp-grpc': ^0.219.0
  '@opentelemetry/exporter-trace-otlp-http': ^0.219.0
  '@opentelemetry/resources': ^2.8.0
  '@opentelemetry/sdk-logs': ^0.219.0
  '@opentelemetry/sdk-metrics': ^2.8.0
  '@opentelemetry/sdk-trace-base': ^2.8.0
  '@opentelemetry/sdk-trace-node': ^2.8.0
  '@opentelemetry/semantic-conventions': ^1.41.1
  '@types/node': ^25.9.3
  c8: ^10.1.3
  env-var: ^7.5.0
  husky: ^9.1.7
  tsup: ^8.5.1
  typescript: ^5.9.3
  zod: ^4.4.3
overrides:
  # Pin a single @bufbuild/protobuf across the graph. Transitive consumers
  # (@lambdalisue/connectrpc-grpcreflect, @bufbuild/protovalidate) otherwise
  # peer-resolve to an older 2.12.x, which splits @connectrpc/connect's protobuf
  # peer into two incompatible instances and breaks the reflection DTS build.
  '@bufbuild/protobuf': ^2.12.1
  '@babel/core@<7.29.6': 7.29.6
  '@grpc/grpc-js@<1.14.4': 1.14.4
  ajv@<8.18.0: 8.18.0
  basic-ftp@<5.2.2: 5.2.2
  brace-expansion@>=4.0.0 <5.0.5: 5.0.5
  esbuild@<0.28.1: 0.28.1
  fast-uri@<3.1.2: 3.1.2
  js-yaml@>=4.0.0 <4.2.0: 4.2.0
  markdown-it@<14.2.0: 14.2.0
  minimatch@<10.2.3: 10.2.3
  picomatch@<2.3.2: 2.3.2
  picomatch@>=4.0.0 <4.0.4: 4.0.4
  protobufjs@<7.6.3: 7.6.3
  protobufjs@>=8.0.0 <8.0.1: 8.0.1
  qs@<6.15.2: 6.15.2
  rollup@>=4.0.0 <4.59.0: 4.59.0
