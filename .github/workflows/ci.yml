name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Lint, Typecheck, Audit (run once on dev Node) ──────────────────────
  quality:
    name: Typecheck, Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "25.2.0"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --prod --audit-level=high
        continue-on-error: true

      - name: Build packages
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

  # ── Node.js test matrix ────────────────────────────────────────────────
  test-node:
    name: "Node ${{ matrix.node-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["22", "25.2.0"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      # Node 22.18+ and 25.x run TypeScript directly via native type stripping.
      # esbuild transpilation is covered by the dedicated test-esbuild job below.
      - name: Unit tests
        run: pnpm test:unit

      - name: Integration tests
        run: pnpm test:integration

  # ── AMQP broker integration (happy path, required) ─────────────────────
  # Runs the events-amqp happy-path integration tests against a real RabbitMQ
  # service container. Recovery scenarios live in the non-blocking job below.
  test-amqp-broker:
    name: AMQP broker integration
    runs-on: ubuntu-latest
    services:
      rabbitmq:
        image: rabbitmq:4-alpine
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "25.2.0"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: AMQP happy-path integration tests
        env:
          AMQP_TEST_URL: amqp://guest:guest@localhost:5672
        run: pnpm --filter @connectum/events-amqp test:integration

  # ── AMQP connection recovery (testcontainers, non-blocking) ────────────
  # Recovery scenarios crash/drop the broker mid-test via testcontainers
  # (programmatic container control). Non-blocking: broker-restart timing can
  # be environment-sensitive, so a failure here must not gate merges.
  test-amqp-recovery:
    name: AMQP recovery (testcontainers)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "25.2.0"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: AMQP recovery tests (testcontainers)
        env:
          RUN_RECOVERY_TESTS: "1"
        run: pnpm --filter @connectum/events-amqp test:integration

  # ── Bun runtime tests ──────────────────────────────────────────────────
  test-bun:
    name: Bun (latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "25.2.0"
          cache: pnpm

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Bun runtime tests
        run: pnpm test:bun

  # ── esbuild transpilation tests ────────────────────────────────────────
  test-esbuild:
    name: esbuild transpilation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "25.2.0"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: esbuild tests
        run: pnpm test:esbuild
