name: Parity Gate

# Release-blocking invariant: every observable behaviour of the in-process
# transport (`@connectum/core` `createLocalTransport` / `Server.client`) must
# structurally match the HTTP/2 transport. This workflow runs the aggregated
# `transportParityTest()` suite on every PR and on `main`.
#
# See:
#   - docs/en/contributing/parity-invariant.md (Behavioural Parity invariant)
#   - docs/en/contributing/parity-coverage.md (covered scenarios)
#   - scripts/parity-suite.sh (aggregated suite runner)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  parity:
    name: HTTP ↔ in-process parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "25.2.0"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run parity suite
        run: ./scripts/parity-suite.sh
