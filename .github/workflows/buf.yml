name: Buf Proto

on:
  pull_request:
    branches: [main]
    paths:
      - "packages/auth/proto/**"
      - "packages/auth/buf.yaml"
      - "packages/events/proto/**"
      - "packages/events/buf.yaml"
      - ".github/workflows/buf.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Lint & Breaking
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [auth, events]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: bufbuild/buf-action@v1
        with:
          input: packages/${{ matrix.package }}
          push: false
