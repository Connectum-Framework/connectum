name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release & Publish
    runs-on: ubuntu-latest
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "25.2.0"
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --prod --audit-level=high
        continue-on-error: true

      - name: Build packages
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test:unit

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: pnpm changeset:version
          publish: pnpm changeset:publish
          title: "chore: version packages"
          commit: "chore: version packages"
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          NPM_CONFIG_PROVENANCE: "true"

      - name: Create draft GitHub release
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION=$(jq -r '.version' packages/core/package.json)
          TAG="v${VERSION}"

          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "::notice::Release ${TAG} already exists, skipping draft creation"
            exit 0
          fi

          NOTES_FILE="$(mktemp)"
          # Highlights-first, deduplicated release notes. Non-fatal: a generator
          # failure must never block the already-published release — fall back to
          # empty notes (the draft is reviewed manually before publishing).
          if ! node scripts/build-release-notes.mjs "${VERSION}" > "$NOTES_FILE"; then
            echo "::warning::build-release-notes.mjs failed; creating draft release with empty notes"
            : > "$NOTES_FILE"
          fi

          if [ ! -s "$NOTES_FILE" ]; then
            echo "::warning::No release notes generated for ${VERSION}; creating draft release with empty notes"
          fi

          PRERELEASE_FLAG=""
          if echo "${VERSION}" | grep -qE "(alpha|beta|rc)"; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "${TAG}" \
            --title "Connectum ${TAG}" \
            --notes-file "$NOTES_FILE" \
            --target "${{ github.sha }}" \
            --draft \
            ${PRERELEASE_FLAG}

          echo "::notice::Created draft release ${TAG} — review and publish at https://github.com/${{ github.repository }}/releases"

      - name: Update Version Packages PR body
        # Runs on the non-publish path, when a Version Packages PR was created/updated.
        # Replaces the size-limited changesets-bot summary with highlights-first,
        # deduplicated notes. Non-fatal — must never fail the release job.
        if: steps.changesets.outputs.published != 'true' && steps.changesets.outputs.hasChangesets == 'true' && steps.changesets.outputs.pullRequestNumber != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          PR="${{ steps.changesets.outputs.pullRequestNumber }}"
          case "$PR" in
            ''|*[!0-9]*)
              echo "::warning::pullRequestNumber '$PR' is not numeric; skipping PR body update"
              exit 0
              ;;
          esac
          git fetch origin changeset-release/main --depth=1
          VERSION=$(git show origin/changeset-release/main:packages/core/package.json | jq -r '.version')

          # Materialize the *versioned* CHANGELOGs from the release branch (main's
          # working tree is not yet bumped). Highlights come from the working tree.
          TMP="$(mktemp -d)"
          for pkg_dir in packages/*/; do
            name=$(basename "$pkg_dir")
            git cat-file -e "origin/changeset-release/main:packages/${name}/CHANGELOG.md" 2>/dev/null || continue
            mkdir -p "${TMP}/${name}"
            git show "origin/changeset-release/main:packages/${name}/CHANGELOG.md" > "${TMP}/${name}/CHANGELOG.md"
            git show "origin/changeset-release/main:packages/${name}/package.json" > "${TMP}/${name}/package.json"
          done

          BODY="$(mktemp)"
          {
            echo "> **Version Packages** PR generated by the Changesets release workflow. Merging it publishes all packages to npm (OIDC + provenance) and creates the draft GitHub Release. Notes below are produced by \`scripts/build-release-notes.mjs\` (highlights-first, deduplicated); full per-package detail lives in each package's \`CHANGELOG.md\`."
            echo ""
            node scripts/build-release-notes.mjs "${VERSION}" --packages-dir "${TMP}" \
              || echo "_(release-notes generator failed; see each package's CHANGELOG.md)_"
          } > "${BODY}"

          # GitHub PR body hard limit is 65536 chars; skip the update if we somehow exceed it.
          if [ "$(wc -c < "${BODY}")" -gt 65000 ]; then
            echo "::warning::Generated PR body exceeds GitHub's size limit; leaving the existing body in place"
            exit 0
          fi

          gh api -X PATCH "repos/${{ github.repository }}/pulls/${PR}" -F body=@"${BODY}"
          echo "::notice::Updated Version Packages PR #${PR} body with generated release notes"

      - name: Check proto changes
        id: proto-changes
        if: steps.changesets.outputs.published == 'true'
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            CHANGED=$(git diff --name-only "$LAST_TAG"..HEAD -- 'packages/auth/proto/' 'packages/events/proto/')
          else
            CHANGED="initial"
          fi
          if [ -n "$CHANGED" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Buf CLI
        if: steps.proto-changes.outputs.changed == 'true'
        uses: bufbuild/buf-action@v1
        with:
          token: ${{ secrets.BUF_TOKEN }}
          setup_only: true

      - name: Push proto to BSR
        if: steps.proto-changes.outputs.changed == 'true'
        run: |
          mkdir -p .bsr/connectum
          for proto_root in packages/*/proto/connectum/*/; do
            [ -d "$proto_root" ] || continue
            cp -R "$proto_root" .bsr/connectum/
          done

          # Nest under connectum/connectum/ so buf resolves package paths correctly
          mkdir -p .bsr/connectum/connectum
          for subdir in .bsr/connectum/*/; do
            name=$(basename "$subdir")
            [ "$name" = "connectum" ] && continue
            mv "$subdir" .bsr/connectum/connectum/
          done

          printf '%s\n' \
            'version: v2' \
            'modules:' \
            '  - path: connectum' \
            '    name: buf.build/connectum-framework/connectum' \
            'lint:' \
            '  use:' \
            '    - STANDARD' \
            'breaking:' \
            '  use:' \
            '    - FILE' \
            > .bsr/buf.yaml

          buf push .bsr \
            --label "${{ github.ref_name }}" \
            --source-control-url "https://github.com/Connectum-Framework/connectum/commit/${{ github.sha }}"

