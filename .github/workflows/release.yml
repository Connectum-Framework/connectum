name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release & Publish
    runs-on: ubuntu-latest
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "25.2.0"
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --prod --audit-level=high
        continue-on-error: true

      - name: Build packages
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test:unit

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
        with:
          version: pnpm changeset:version
          publish: pnpm changeset:publish
          title: "chore: version packages"
          commit: "chore: version packages"
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          NPM_CONFIG_PROVENANCE: "true"

      - name: Create draft GitHub release
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION=$(jq -r '.version' packages/core/package.json)
          TAG="v${VERSION}"

          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "::notice::Release ${TAG} already exists, skipping draft creation"
            exit 0
          fi

          NOTES_FILE="$(mktemp)"
          ver_re=$(printf '%s' "${VERSION}" | sed 's/[.[\*^$/]/\\&/g')
          for pkg_dir in packages/*/; do
            changelog_file="${pkg_dir}CHANGELOG.md"
            [ -f "$changelog_file" ] || continue
            pkg_name=$(jq -r '.name' "${pkg_dir}package.json")
            section=$(awk "/^## ${ver_re}\$/{found=1; next} /^## [0-9]/{if(found) exit} found" "$changelog_file")
            if [ -n "$(echo "$section" | tr -d '[:space:]')" ]; then
              {
                echo "## ${pkg_name}@${VERSION}"
                echo "$section"
                echo ""
              } >> "$NOTES_FILE"
            fi
          done

          if [ ! -s "$NOTES_FILE" ]; then
            echo "::warning::No changelog entries found for ${VERSION}; creating draft release with empty notes"
          fi

          PRERELEASE_FLAG=""
          if echo "${VERSION}" | grep -qE "(alpha|beta|rc)"; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "${TAG}" \
            --title "Connectum ${TAG}" \
            --notes-file "$NOTES_FILE" \
            --target "${{ github.sha }}" \
            --draft \
            ${PRERELEASE_FLAG}

          echo "::notice::Created draft release ${TAG} — review and publish at https://github.com/${{ github.repository }}/releases"

      - name: Check proto changes
        id: proto-changes
        if: steps.changesets.outputs.published == 'true'
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            CHANGED=$(git diff --name-only "$LAST_TAG"..HEAD -- 'packages/auth/proto/' 'packages/events/proto/')
          else
            CHANGED="initial"
          fi
          if [ -n "$CHANGED" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Buf CLI
        if: steps.proto-changes.outputs.changed == 'true'
        uses: bufbuild/buf-action@v1
        with:
          token: ${{ secrets.BUF_TOKEN }}
          setup_only: true

      - name: Push proto to BSR
        if: steps.proto-changes.outputs.changed == 'true'
        run: |
          mkdir -p .bsr/connectum
          for proto_root in packages/*/proto/connectum/*/; do
            [ -d "$proto_root" ] || continue
            cp -R "$proto_root" .bsr/connectum/
          done

          # Nest under connectum/connectum/ so buf resolves package paths correctly
          mkdir -p .bsr/connectum/connectum
          for subdir in .bsr/connectum/*/; do
            name=$(basename "$subdir")
            [ "$name" = "connectum" ] && continue
            mv "$subdir" .bsr/connectum/connectum/
          done

          printf '%s\n' \
            'version: v2' \
            'modules:' \
            '  - path: connectum' \
            '    name: buf.build/connectum-framework/connectum' \
            'lint:' \
            '  use:' \
            '    - STANDARD' \
            'breaking:' \
            '  use:' \
            '    - FILE' \
            > .bsr/buf.yaml

          buf push .bsr \
            --label "${{ github.ref_name }}" \
            --source-control-url "https://github.com/Connectum-Framework/connectum/commit/${{ github.sha }}"

